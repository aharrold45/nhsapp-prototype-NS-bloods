{% extends 'layout-app.html' %}
{% set hub = "Your health" %}
{% set backLink = true %}

{% block content %}
<div class="nhsuk-grid-row">
  <div class="nhsuk-grid-column-full">

    <h1 class="nhsuk-heading-m" style="margin-bottom:2px">Chelmsford Phlebotomy Service</h1>
    <p class="nhsuk-body-s" style="color:#4c6272; margin-bottom:20px">30-minute appointments &nbsp;·&nbsp; Mon–Fri, 9:00am – 5:00pm</p>

    <style>
      .cal-nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .cal-nav-label { font-weight: 700; font-size: 18px; color: #212b32; }
      .cal-nav-btn {
        background: none;
        border: none;
        font-size: 32px;
        color: #005eb8;
        padding: 0 4px;
        cursor: pointer;
        line-height: 1;
      }
      .cal-nav-btn:disabled { color: #b1b4b6; cursor: default; }
      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 3px;
        margin-bottom: 24px;
      }
      .cal-hdr {
        text-align: center;
        font-size: 11px;
        font-weight: 700;
        color: #4c6272;
        padding: 0 0 8px;
      }
      .cal-cell {
        aspect-ratio: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        border-radius: 50%;
        border: 2px solid transparent;
        background: none;
        color: #212b32;
        cursor: default;
        width: 100%;
        padding: 0;
        box-sizing: border-box;
      }
      .cal-cell--avail {
        background: #d8f0e8;
        color: #0b5a3b;
        font-weight: 700;
        cursor: pointer;
      }
      .cal-cell--avail:hover { border-color: #0b5a3b; }
      .cal-cell--selected { background: #0b5a3b !important; color: #fff !important; border-color: #0b5a3b; }
      .cal-cell--dim { color: #b1b4b6; }
      .slots-panel { border-top: 2px solid #d8dde0; padding-top: 20px; }
      .slots-panel-heading { font-size: 17px; font-weight: 700; margin: 0 0 4px; color: #212b32; }
      .slots-count { font-size: 14px; color: #4c6272; margin: 0 0 16px; }
      .slots-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
      .slot-btn {
        display: block;
        text-align: center;
        text-decoration: none;
        background: #fff;
        border: 2px solid #0b5a3b;
        color: #0b5a3b;
        padding: 12px 4px;
        border-radius: 8px;
        font-weight: 700;
        font-size: 14px;
      }
      .slot-btn:hover { background: #f0fff4; }
      .cal-legend { display: flex; gap: 16px; margin-bottom: 16px; font-size: 13px; color: #4c6272; align-items: center; }
      .cal-legend-dot { width: 16px; height: 16px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    </style>

    <div class="cal-legend">
      <span><span class="cal-legend-dot" style="background:#d8f0e8; border:1px solid #0b5a3b; vertical-align:middle"></span>Slots available</span>
      <span><span class="cal-legend-dot" style="background:#e8e8e8; vertical-align:middle"></span>Unavailable</span>
    </div>

    <div class="cal-nav">
      <button class="cal-nav-btn" id="prev-month" aria-label="Previous month">&#8249;</button>
      <span class="cal-nav-label" id="month-label"></span>
      <button class="cal-nav-btn" id="next-month" aria-label="Next month">&#8250;</button>
    </div>

    <div class="cal-grid" id="cal-grid"></div>

    <div class="slots-panel" id="slots-panel" style="display:none">
      <p class="slots-panel-heading" id="slots-heading"></p>
      <p class="slots-count" id="slots-count"></p>
      <div class="slots-grid" id="slots-grid"></div>
    </div>

    <script>
      (function () {
        var TODAY = new Date();
        TODAY.setHours(0, 0, 0, 0);

        function nextMonday(from) {
          var d = new Date(from);
          var dow = d.getDay();
          var ahead = dow === 1 ? 0 : dow === 0 ? 1 : 8 - dow;
          d.setDate(d.getDate() + ahead);
          return d;
        }
        var START = nextMonday(TODAY);
        var END = new Date(START);
        END.setDate(START.getDate() + 28);

        var ALL_SLOTS = [
          '9:00am', '9:30am', '10:00am', '10:30am',
          '11:00am', '11:30am', '12:00pm', '12:30pm',
          '1:00pm', '1:30pm', '2:00pm', '2:30pm',
          '3:00pm', '3:30pm', '4:00pm', '4:30pm'
        ];

        function availableSlots(dateStr) {
          var h = 0;
          for (var i = 0; i < dateStr.length; i++) {
            h = (Math.imul(h, 31) + dateStr.charCodeAt(i)) >>> 0;
          }
          var rng = function () {
            h = Math.imul(h ^ (h >>> 15), h | 1) >>> 0;
            h ^= h + Math.imul(h ^ (h >>> 7), h | 61);
            return ((h ^ (h >>> 14)) >>> 0) / 4294967296;
          };
          return ALL_SLOTS.filter(function () { return rng() > 0.28; });
        }

        function isoDate(d) { return d.toISOString().split('T')[0]; }

        function fmtFull(d) {
          return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }

        var viewYear = TODAY.getFullYear();
        var viewMonth = TODAY.getMonth();
        var minYear = TODAY.getFullYear();
        var minMonth = TODAY.getMonth();
        var maxDate = new Date(END);
        var maxYear = maxDate.getFullYear();
        var maxMonth = maxDate.getMonth();

        function renderCalendar() {
          var firstDay = new Date(viewYear, viewMonth, 1);
          var daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
          var startDow = firstDay.getDay() - 1;
          if (startDow < 0) startDow = 6;

          document.getElementById('month-label').textContent =
            firstDay.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
          document.getElementById('prev-month').disabled =
            viewYear === minYear && viewMonth === minMonth;
          document.getElementById('next-month').disabled =
            viewYear === maxYear && viewMonth === maxMonth;

          var DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
          var html = DAY_NAMES.map(function (d) {
            return '<div class="cal-hdr">' + d + '</div>';
          }).join('');

          for (var i = 0; i < startDow; i++) {
            html += '<div class="cal-cell"></div>';
          }

          for (var d = 1; d <= daysInMonth; d++) {
            var date = new Date(viewYear, viewMonth, d);
            var isWeekend = date.getDay() === 0 || date.getDay() === 6;
            var isPast = date < TODAY;
            var inRange = date >= START && date < END && !isWeekend && !isPast;
            var ds = isoDate(date);
            var slots = inRange ? availableSlots(ds) : [];
            var hasSlots = slots.length > 0;
            var label = fmtFull(date);

            if (hasSlots) {
              html += '<button class="cal-cell cal-cell--avail" data-date="' + ds + '" data-label="' + label + '" aria-label="' + label + ', ' + slots.length + ' slots available">' + d + '</button>';
            } else {
              html += '<div class="cal-cell cal-cell--dim" aria-label="' + label + ', no slots">' + d + '</div>';
            }
          }

          var grid = document.getElementById('cal-grid');
          grid.innerHTML = html;

          grid.querySelectorAll('.cal-cell--avail').forEach(function (btn) {
            btn.addEventListener('click', function () {
              grid.querySelectorAll('.cal-cell--selected').forEach(function (el) {
                el.classList.remove('cal-cell--selected');
              });
              btn.classList.add('cal-cell--selected');
              showSlots(btn.dataset.date, btn.dataset.label);
            });
          });
        }

        function showSlots(dateStr, label) {
          var slots = availableSlots(dateStr);
          document.getElementById('slots-heading').textContent = label;
          document.getElementById('slots-count').textContent = slots.length + ' slots available';
          var html = '';
          for (var i = 0; i < slots.length; i++) {
            var slot = slots[i];
            var href = '/pages/time-explore2/slot?date=' + encodeURIComponent(label) + '&time=' + encodeURIComponent(slot);
            html += '<a class="slot-btn" href="' + href + '">' + slot + '</a>';
          }
          document.getElementById('slots-grid').innerHTML = html;
          var panel = document.getElementById('slots-panel');
          panel.style.display = '';
          panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        document.getElementById('prev-month').addEventListener('click', function () {
          viewMonth--;
          if (viewMonth < 0) { viewMonth = 11; viewYear--; }
          renderCalendar();
          document.getElementById('slots-panel').style.display = 'none';
        });
        document.getElementById('next-month').addEventListener('click', function () {
          viewMonth++;
          if (viewMonth > 11) { viewMonth = 0; viewYear++; }
          renderCalendar();
          document.getElementById('slots-panel').style.display = 'none';
        });

        renderCalendar();
      })();
    </script>

  </div>
</div>
{% endblock %}
